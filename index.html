<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligare Medical Fitness シフト表</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <h1>Ligare Medical Fitness シフト表</h1>
  <nav class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="staff">スタッフ用</button>
    <button class="tab-btn" data-tab="admin">管理者用</button>
  </nav>
</header>

<main>

  <!-- スタッフ用: 出勤希望日を入力 -->
  <section id="tab-staff" class="tab-panel active">
    <div class="panel-card">
      <label class="staff-select-label">
        あなたの名前
        <select id="staffSelect">
          <option value="">選択してください</option>
        </select>
      </label>
    </div>

    <div class="deadline-notice">
      シフト希望の提出期限は<strong>毎月25日</strong>です。翌々月分の出勤希望を期限までに入力してください。
    </div>

    <div class="confirmed-notice" id="confirmedNotice" style="display:none;">
      <p class="confirmed-notice-title">この月の確定シフト</p>
      <ul id="confirmedList" class="confirmed-list"></ul>
    </div>

    <div class="calendar-header">
      <button class="month-nav" id="prevMonthStaff" aria-label="前の月">&#8592;</button>
      <span class="month-label" id="monthLabelStaff"></span>
      <button class="month-nav" id="nextMonthStaff" aria-label="次の月">&#8594;</button>
    </div>

    <div class="calendar-grid" id="calendarStaff"></div>
    <p class="hint">名前を選んでから日付をクリックすると、○(出勤可能)を選べます。時間相談などがあればメモ欄に書けます。アサイン(勤務時間)が確定している日は、その時間が表示されます。</p>

    <div class="submit-section">
      <button type="button" id="submitShiftBtn" class="primary-btn submit-btn">この月のシフト希望を提出する</button>
      <p class="submit-status" id="submitStatusText"></p>
    </div>
  </section>

  <!-- 管理者用: 希望日の確認・アサイン・スタッフ管理 -->
  <section id="tab-admin" class="tab-panel">
    <div class="calendar-header">
      <button class="month-nav" id="prevMonthAdmin" aria-label="前の月">&#8592;</button>
      <span class="month-label" id="monthLabelAdmin"></span>
      <button class="month-nav" id="nextMonthAdmin" aria-label="次の月">&#8594;</button>
    </div>

    <div class="calendar-grid" id="calendarAdmin"></div>
    <p class="hint">日付をクリックすると、その日の希望者一覧とアサイン設定が開きます。</p>

    <details class="panel-card staff-manage-details" open>
      <summary>この月の提出状況</summary>
      <ul id="submissionStatusList" class="staff-list"></ul>
    </details>

    <details class="panel-card staff-manage-details">
      <summary>スタッフの追加・削除</summary>
      <form id="addStaffForm" class="add-staff-form">
        <input type="text" id="newStaffName" placeholder="スタッフ名を入力" required>
        <button type="submit">追加</button>
      </form>
      <ul id="staffList" class="staff-list"></ul>
      <button type="button" id="cleanupOrphansBtn" class="clear-status-btn">不明なスタッフのデータを整理する</button>
    </details>
  </section>

</main>

<!-- 日付詳細モーダル(管理者用) -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <button id="modalClose" class="modal-close" aria-label="閉じる">&times;</button>
    <h3 id="modalDate"></h3>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-actions" id="modalActions">
      <button id="modalSave" class="primary-btn">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
